version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace/law-advise:cached
    command: sleep infinity
    depends_on:
      - db

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_password
      POSTGRES_DB: trading_app_db
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data-law-advise:/var/lib/postgresql/data

volumes:
  postgres-data-law-advise:
